server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml;

    # ── Security headers ────────────────────────────────────────────────────
    # Nota: le location che definiscono add_header propri NON ereditano questi.
    # Per questo i header critici vengono ripetuti nella location degli asset.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy
      "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy
      "default-src 'self'; \
       script-src 'self'; \
       style-src 'self'; \
       img-src 'self' data: blob:; \
       font-src 'self'; \
       connect-src 'self'; \
       object-src 'none'; \
       base-uri 'self'; \
       form-action 'self'; \
       frame-ancestors 'none'; \
       worker-src 'none';" always;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    # add_header qui sovrascrive il blocco server: ripetiamo i header di sicurezza
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }
}
