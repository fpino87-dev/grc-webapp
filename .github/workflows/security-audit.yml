name: security-audit

# Esegue pip-audit e npm audit ogni notte e ad ogni PR.
# pip-audit: modalita' --strict (vulnerabilita' Python blocca la build).
# npm audit: blocca solo su high/critical in dipendenze di produzione.
# Node.js 24 runner richiesto per eliminare deprecation warning GitHub Actions.

on:
  schedule:
    # Ogni notte alle 03:30 UTC (04:30/05:30 ora italiana).
    - cron: "30 3 * * *"
  push:
    branches: [main]
    paths:
      - "backend/requirements/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/security-audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/requirements/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/security-audit.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pip-audit:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements/base.txt
      - name: Install pip-audit
        run: pip install --upgrade "pip-audit>=2.7.0"
      - name: Audit backend deps (strict)
        run: |
          # PYSEC-2025-183 (pyjwt) exemption removed 2026-06-09: OSV now caps
          # the advisory at <=2.10.1 and PyJWT 2.13.0 is available upstream.
          pip-audit --strict \
            --requirement backend/requirements/base.txt \
            --no-deps
      - name: Audit dev deps (warning-only)
        if: always()
        run: |
          pip-audit \
            --requirement backend/requirements/dev.txt \
            --no-deps || true

  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci --no-audit --no-fund --legacy-peer-deps
      - name: npm audit (production)
        working-directory: frontend
        run: |
          # Blocca solo su high/critical in dipendenze di produzione.
          # low/moderate sono accettabili in attesa di patch upstream.
          npm audit --omit=dev --audit-level=high
      - name: Save full audit report (always)
        if: always()
        working-directory: frontend
        run: npm audit --omit=dev --json > npm-audit-report.json || true
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit-report.json
          retention-days: 30
